#:schema ./.aviutl2-cli/aviutl2.schema.json
# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。

[project]
id = "sevenc-nanashi.budoux-obj2"
name = "budoux.obj2"
version = "0.1.0"

[development]
aviutl2_version = "latest"

[preview]
aviutl2_version = "latest"

[artifacts.English-budoux-obj2]
destination = "Language/English.budoux-obj2.aul2"
source = "./i18n/English.budoux-obj2.aul2"

[artifacts.English-aul2]
enabled = false
destination = "Language/English.aul2"
source = "https://raw.githubusercontent.com/aviutl2/aviutl2_community_translation/refs/heads/main/locales/community_en.aul2"

[artifacts.English-aul2.profiles.debug]
enabled = true

[artifacts.budoux-obj2]
build = "aulua build"
source = "./target/budoux.obj2"
destination = "Script/budoux.obj2.obj2"

[artifacts.budoux-mod2]
destination = "Script/budoux.mod2"

[artifacts.budoux-mod2.profiles.debug]
build = "cargo build"
source = "target/debug/budoux.dll"

[artifacts.budoux-mod2.profiles.release]
build = "cargo build --release"
source = "target/release/budoux.dll"

[catalog]
id = "sevenc-nanashi.budoux-obj2"
name = "budoux.obj2"
summary = "横幅を指定してテキストを折り返すスクリプト"
type = "common"
description = { type = "url", url = "https://raw.githubusercontent.com/sevenc-nanashi/budoux.obj2/main/README.md" }
author = "Nanashi."
download_source = { type = "github", owner = "sevenc-nanashi", repo = "budoux.obj2" }
homepage = "https://github.com/sevenc-nanashi/budoux.obj2"
license = { type = "MIT", template = false, text = { type = "file", path = "./LICENSE" } }

[release]
prebuild = ["cargo about generate ./about.hbs -o ./release/package.txt"]
package_template = "./release/package.txt"
package_information = "{name} v{version} / 横幅を指定してテキストを折り返すスクリプト"
